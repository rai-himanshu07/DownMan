<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>body{font:14px Inter,system-ui;max-width:480px;margin:40px auto;color:#e2e8f0;background:#0b0d17}input{width:100%;padding:8px;border-radius:8px;border:1px solid #333;background:#111421;color:#fff}label{display:block;margin:14px 0 4px}</style>
  </head>
  <body>
    <h2>DownMan settings</h2>
    <label>App endpoint</label>
    <input id="server" placeholder="http://127.0.0.1:6802" />
    <label>Use cookies from browser (for logged-in / age-restricted videos)</label>
    <select id="cookies" style="width:100%;padding:8px;border-radius:8px;border:1px solid #333;background:#111421;color:#fff">
      <option value="">None</option>
      <option value="chrome">Chrome</option>
      <option value="chromium">Chromium</option>
      <option value="brave">Brave</option>
      <option value="edge">Edge</option>
      <option value="firefox">Firefox</option>
      <option value="vivaldi">Vivaldi</option>
    </select>
    <label><input type="checkbox" id="intercept" style="width:auto"> Intercept large browser downloads</label>
    <script src="options.js"></script>
  </body>
</html>
