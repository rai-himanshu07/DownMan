<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DownMan media resolver fixture</title>
  <style>
    body { margin: 0; min-height: 100vh; background: #10131c; color: #fff; font-family: sans-serif; }
    .player { position: relative; width: 640px; height: 360px; margin: 70px 40px; background: #283040; }
    .player > a { position: absolute; top: 8px; left: 8px; z-index: 1; }
    video { display: block; width: 100%; height: 100%; }
    .overlay { position: absolute; inset: 0; z-index: 2; display: grid; place-items: center; background: rgba(0, 0, 0, .08); }
  </style>
</head>
<body>
  <article>
    <a href="/wrong/status/111111111"><time>Earlier post</time></a>
    <div class="player">
      <a href="/right/status/222222222"><time>Selected post</time></a>
      <video></video>
      <div class="overlay">Interaction overlay</div>
    </div>
  </article>
  <script>
    const video = document.querySelector("video");
    Object.defineProperties(video, {
      paused: { configurable: true, value: false },
      ended: { configurable: true, value: false },
      readyState: { configurable: true, value: 4 },
      duration: { configurable: true, value: 120 },
      currentSrc: { configurable: true, value: "blob:http://127.0.0.1/player" },
    });

    globalThis.__dmMessages = [];
    globalThis.chrome = {
      runtime: {
        id: "fixture",
        lastError: null,
        sendMessage(message, callback) {
          globalThis.__dmMessages.push(structuredClone(message));
          if (message.dm === "media-intent") {
            callback({
              ok: false,
              code: "choose",
              bundle: {
                schemaVersion: 2,
                intent: message.intent,
                candidates: [
                  { url: "https://cdn.test/one", kind: "file", score: 81 },
                  { url: "https://cdn.test/two", kind: "file", score: 78 },
                ],
              },
              choices: [
                { index: 0, label: "Video file", detail: "cdn.test/one" },
                { index: 1, label: "Video file", detail: "cdn.test/two" },
              ],
            });
          } else {
            callback?.({ ok: true });
          }
        },
        onMessage: { addListener(listener) { globalThis.__dmContentListener = listener; } },
      },
    };
  </script>
  <script src="../extensions/media-resolver.js?v=2"></script>
  <script src="../extensions/content.js?v=2"></script>
</body>
</html>
